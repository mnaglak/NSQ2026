<!doctype html>
 <!-- This says your file is in .html -->
<html lang="en">
<!-- This says your file is in English -->

<head>
    <!-- This opens your header. Your header is where different libraries and plugins are loaded -->
    <title>NPQ 2026</title> <!-- Put the title of your map here -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Load Leaflet files locally -->
    <link rel="stylesheet" href="./leaflet/leaflet.css" /> <!--Put the path to the leaflet.css  you downloaded here -->
    <script src="./leaflet/leaflet.js"></script>  <!-- Put the path to the leaflet.js you downloaded here -->

   
 
    <style>

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            position: fixed;
        }

        #map {
            height: 100%;
            width: 100vw;
        }


    </style>


    <style type="text/css" media="screen">
        html {
            -webkit-text-size-adjust: none;
            touch-action: none; /*prevent user scaling*/
        }
    </style>

</head>


<!-- In the body of the code, you need to create the division on the page for your map and call the map.js file you will make next -->
<body>
    <div id="map">
    </div> <!--set the size of your map -->
    <script type="text/javascript" src="NSQ.js"></script> <!--call the javascript file for your map -->


</body>


</html>
